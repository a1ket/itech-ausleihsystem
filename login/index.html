<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ITECH Ausleihsystem – Login</title>

<style>

:root{
--field-width:240px;
--button-size:2.5rem;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
}

.page{
display:flex;
flex-direction:column;
align-items:center;
gap:1.5rem;
width:100%;
max-width:420px;
padding:1.5rem;
}

h1{
margin:0;
font-size:1.6rem;
}

form{
display:flex;
flex-direction:column;
gap:.9rem;
align-items:center;
width:100%;
}

.field{
display:flex;
flex-direction:column;
width:100%;
max-width:var(--field-width);
}

label{
font-size:.9rem;
margin-bottom:.25rem;
}

input{
padding:.6rem .75rem;
font-size:1rem;
border:1px solid #ccc;
border-radius:.35rem;
}

button{
width:var(--button-size);
height:var(--button-size);
border:none;
border-radius:.35rem;
background:#000;
color:#fff;
font-size:1.1rem;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.submit{
width:100%;
max-width:var(--field-width);
display:flex;
justify-content:flex-end;
}

.message{
margin-top:.7rem;
font-size:.9rem;
min-height:1.2rem;
}

.logo{
margin-top:1rem;
width:100%;
opacity:.25;
}

</style>
</head>

<body>

<main class="page">

<h1>Login</h1>

<form id="login-form">

<div class="field">
<label for="username">Benutzername</label>
<input id="username" type="text" autocomplete="username" required>
</div>

<div class="field">
<label for="password">Passwort</label>
<input id="password" type="password" autocomplete="current-password" required>
</div>

<div class="submit">
<button type="submit">→</button>
</div>

<div id="message" class="message"></div>

</form>

<img
class="logo"
src="https://moodle.itech-bs14.de/pluginfile.php/1/core_admin/logocompact/300x300/1768826611/logo_Signe.png"
alt="ITECH Logo"
/>

</main>

<script type="module" src="./login.js"></script>

</body>
</html>
