<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ITECH Ausleihsystem</title>
    <style>
        body{margin:0;font-family:sans-serif;display:flex;flex-direction:column;height:100vh;background:#f0f2f5}
        header{padding:1rem;background:#202123;color:#fff;display:flex;justify-content:space-between;align-items:center}
        main{flex:1;display:flex;gap:1rem;padding:1rem;overflow:hidden}
        #chat-section{flex:2;display:flex;flex-direction:column;background:#fff;border-radius:8px;padding:1rem}
        #chat-box{flex:1;overflow-y:auto;padding:10px;background:#f8f9fa;display:flex;flex-direction:column;gap:10px}
        .bubble{padding:10px;border-radius:15px;max-width:75%;font-size:0.9rem}
        .user{background:#007bff;color:#fff;align-self:flex-end}
        .ai{background:#e9ecef;color:#333;align-self:flex-start}
        #loans-section{flex:1;background:#fff;border-radius:8px;padding:1rem;overflow-y:auto}
    </style>
</head>
<body>

<header>
    <span>ITECH Ausleihsystem</span>
    <button id="logout">Abmelden</button>
</header>

<main>
    <section id="chat-section">
        <div id="chat-box"></div>
        <div style="display:flex;gap:10px;margin-top:10px">
            <input id="input" style="flex:1;padding:10px" placeholder="Frag die KI...">
            <button id="send">Senden</button>
        </div>
    </section>
    <aside id="loans-section">
        <h3>Deine Ausleihen</h3>
        <div id="loans">Lade Daten...</div>
    </aside>
</main>

<script type="module">
    import { supabase } from './supabase.js';
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user) window.location.replace('/login/index.html');

    const chatBox = document.getElementById('chat-box'), input = document.getElementById('input'), loans = document.getElementById('loans');

    const append = (text, role) => {
        const d = document.createElement('div');
        d.className = `bubble ${role}`;
        d.textContent = text;
        chatBox.appendChild(d);
        chatBox.scrollTop = chatBox.scrollHeight;
        return d;
    };

    const loadLoans = async () => {
        const { data } = await supabase.from('loans').select('*').eq('user_id', user.id);
        loans.innerHTML = !data || data.length === 0 ? "Keine Geräte ausgeliehen." : data.map(d => `
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee">
                <div><strong>${d.item_name}</strong></div>
                <button onclick="returnItem('${d.id}')">Abgeben</button>
            </div>`).join('');
    };

    window.returnItem = async (id) => {
        await supabase.from('loans').update({ user_id: null, loan_date: null, return_date: null }).eq('id', id);
        loadLoans();
    };

    document.getElementById('send').onclick = async () => {
        const msg = input.value.trim();
        if (!msg) return;
        append(msg, 'user');
        input.value = '';
        const ai = append("...", "ai");
        const res = await fetch('/api/ai', { method: 'POST', body: JSON.stringify({ message: msg, userId: user.id }) });
        const data = await res.json();
        ai.textContent = data.reply;
        if (data.actionPerformed) loadLoans();
    };

    document.getElementById('logout').onclick = () => { localStorage.removeItem("loggedInUser"); window.location.replace('/login/index.html'); };
    
    loadLoans();
</script>
</body>
</html>
