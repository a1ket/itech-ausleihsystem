<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>itech-ausleihsystem</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fff;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        width: 100%;
        max-width: 440px;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      .login {
        width: 100%;
        text-align: center;
      }
      .login h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
        letter-spacing: 0.03em;
      }
      .login form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
      .form-field {
        width: 100%;
      }
      .form-field label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        text-align: left;
      }
      .form-field input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 0.35rem;
      }
      .logo-wrap {
        margin-top: 1.5rem;
        display: flex;
        justify-content: center;
      }
      .logo {
        width: 60vmin;
        max-width: 80vw;
        height: auto;
        object-fit: contain;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="login">
        <h1>Login</h1>
        <form>
          <div class="form-field">
            <label for="username">Benutzername</label>
            <input id="username" name="username" type="text" autocomplete="username" />
          </div>
          <div class="form-field">
            <label for="password">Passwort</label>
            <input id="password" name="password" type="password" autocomplete="current-password" />
          </div>
        </form>

        <div class="logo-wrap">
          <img src="https://moodle.itech-bs14.de/pluginfile.php/1/core_admin/logocompact/300x300/1768826611/logo_Signe.png" class="logo" alt="moodle@ITECH" />
        </div>
      </section>
    </main>
  </body>
</html>
