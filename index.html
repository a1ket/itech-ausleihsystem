<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>itech-ausleihsystem</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; display: flex; gap: 2rem; }
    #chat-container-main { flex: 2; }
    #loan-table-container { flex: 1; display: none; border:1px solid #ccc; padding:1rem; max-height:400px; overflow-y:auto; }

    /* Chat Styling */
    #chat-box { border:1px solid #ccc; padding:1rem; max-height:400px; overflow-y:auto; margin-bottom:0.5rem; }
    .chat-bubble { margin: 0.25rem 0; padding: 0.5rem; border-radius: 0.5rem; max-width:70%; word-wrap: break-word; }
    .chat-user { background: #ddf; text-align: right; margin-left:auto; }
    .chat-ai { background: #eee; text-align: left; margin-right:auto; }

    #chat-input { flex:1; padding:0.5rem; }
    #send-btn { padding:0.5rem 1rem; cursor:pointer; margin-left:0.5rem; }
    #chat-input-container { display:flex; gap:0.5rem; }

    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
  <div id="chat-container-main">
    <h1>itech-ausleihsystem</h1>
    <div id="chat-box"></div>
    <div id="chat-input-container">
      <input id="chat-input" type="text" placeholder="Schreibe eine Nachricht..." />
      <button id="send-btn">Senden</button>
    </div>
  </div>

  <!-- Versteckte Tabelle für ausgeliehene Gegenstände -->
  <div id="loan-table-container">
    <h2>Meine Ausleihen</h2>
    <div id="loan-table-content">
      <p>Keine Ausleihen.</p>
    </div>
  </div>

  <!-- Supabase -->
  <script type="module" src="supabase.js"></script>

  <!-- Chat + Ausleihe JS -->
  <script type="module">
    import { supabase } from './supabase.js';

    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    const loanTableContainer = document.getElementById('loan-table-container');
    const loanTableContent = document.getElementById('loan-table-content');

    let userId = null;

    async function loadUser() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) {
        chatBox.innerHTML = "<p>Bitte einloggen, um den Chat zu benutzen.</p>";
        return;
      }
      userId = session.user.id;
      loadUserLoans(); // bisherige Ausleihen laden
    }

    async function loadUserLoans() {
      const { data, error } = await supabase
        .from('loans')
        .select('*')
        .eq('user_id', userId)
        .order('loan_date', { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        loanTableContent.innerHTML = "<p>Keine Ausleihen.</p>";
        return;
      }

      // Tabelle anzeigen
      loanTableContainer.style.display = 'block';

      let html = '<table><tr><th>Item</th><th>Fällig</th></tr>';
      data.forEach(row => {
        const loanDate = new Date(row.loan_date);
        const dueDate = new Date(loanDate);
        dueDate.setDate(dueDate.getDate() + 25); // Maximaldauer 25 Tage
        html += `<tr><td>${row.item_name}</td><td>${dueDate.toLocaleDateString()}</td></tr>`;
      });
      html += '</table>';
      loanTableContent.innerHTML = html;
    }

    function appendMessage(text, role) {
      const div = document.createElement('div');
      div.textContent = text;
      div.className = 'chat-bubble ' + (role === 'user' ? 'chat-user' : 'chat-ai');
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text || !userId) return;

      appendMessage(text, 'user');
      chatInput.value = '';

      // User-Nachricht speichern
      await supabase.from('user_chats').insert({ user_id: userId, message: text, role: 'user' });

      // KI-Antwort abrufen
      try {
        const response = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, message: text })
        }).then(r => r.json());

        if (response?.reply) {
          appendMessage(response.reply, 'ai');

          // KI-Nachricht speichern
          await supabase.from('user_chats').insert({ user_id: userId, message: response.reply, role: 'ai' });

          // Wenn die KI eine Ausleihe bestätigt hat, Tabelle neu laden
          if (response?.loanUpdated) {
            loadUserLoans();
          }
        }
      } catch (e) {
        appendMessage("Fehler bei der KI-Antwort.", 'ai');
        console.error(e);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    loadUser();
  </script>
</body>
</html>
