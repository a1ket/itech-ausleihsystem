<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>itech-ausleihsystem</title>

<style>
  body { font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 1rem; background: #202123; color: white; text-align: center; font-size: 1.5rem; }

  main { flex: 1; display: flex; gap: 1rem; padding: 1rem; }

  #chat-section {
    flex: 3;
    display: flex;
    flex-direction: column;
    border: 1px solid #ccc;
    border-radius: 0.5rem;
    padding: 1rem;
  }

  #loans-section {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 0.5rem;
    padding: 1rem;
    display: none;
  }

  #chat-box {
    flex: 1;
    overflow-y: auto;
    background: #f7f7f8;
    padding: 0.5rem;
    border-radius: 0.5rem;
  }

  .chat-bubble {
    padding: 0.5rem;
    margin: 0.25rem 0;
    border-radius: 0.5rem;
    max-width: 70%;
  }

  .chat-user { background: #1a73e8; color: white; margin-left: auto; }
  .chat-ai { background: #e5e5ea; }

  #chat-input-container { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
</style>
</head>

<body>

<header>itech-ausleihsystem</header>

<main>
  <div id="chat-section">
    <div id="chat-box"></div>

    <div id="chat-input-container">
      <input id="chat-input" type="text" placeholder="Schreibe eine Nachricht..." />
      <button id="send-btn">Senden</button>
    </div>
  </div>

  <div id="loans-section">
    <h3>Deine Ausleihen</h3>
    <div id="loans-content"></div>
  </div>
</main>

<script type="module">
import { supabase } from './supabase.js';

let userId = null;

const chatBox = document.getElementById('chat-box');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const loansSection = document.getElementById('loans-section');
const loansContent = document.getElementById('loans-content');

// LOGIN CHECK
function checkLogin() {
  const user = localStorage.getItem("loggedInUser");
  if (!user) {
    window.location.href = '/login/index.html';
    return false;
  }
  userId = JSON.parse(user).id;
  return true;
}

// CHAT UI
function appendMessage(text, role) {
  const div = document.createElement('div');
  div.textContent = text;
  div.className = 'chat-bubble ' + (role === 'user' ? 'chat-user' : 'chat-ai');
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// LOANS LADEN
async function loadLoans() {
  const { data } = await supabase
    .from('loans')
    .select('*')
    .eq('user_id', userId);

  if (!data || data.length === 0) {
    loansSection.style.display = 'none';
    return;
  }

  loansSection.style.display = 'block';

  let html = '<table><tr><th>Item</th><th style="color:red;">Fällig in</th></tr>';

  const now = new Date();

  data.forEach(row => {
    const loanDate = new Date(row.loan_date);
    const days = 25 - Math.floor((now - loanDate)/(1000*60*60*24));
    html += `<tr><td>${row.item_name}</td><td style="color:red;">${days} Tage</td></tr>`;
  });

  html += '</table>';
  loansContent.innerHTML = html;
}

// KI LOGIK (angepasst für Vercel)
async function getAIReply(message) {
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, userId })
    });

    if (!res.ok) {
      console.error("Fehler bei AI-Anfrage:", res.statusText);
      return "Fehler bei der KI-Anfrage.";
    }

    const data = await res.json();
    return data.reply;
  } catch (err) {
    console.error("Fehler bei AI-Anfrage:", err);
    return "Fehler bei der KI-Anfrage.";
  }
}

// SEND MESSAGE
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  appendMessage(text, 'user');
  chatInput.value = '';

  const reply = await getAIReply(text);
  appendMessage(reply, 'ai');
}

sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

// INIT
if (checkLogin()) {
  loadLoans();
}
</script>

</body>
</html>
