<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITECH Ausleihsystem - Hauptseite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Hier dein CSS für das Layout, Chatfenster usw. */
        body { font-family: sans-serif; padding: 20px; }
        #chat-container { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-bottom: 10px; }
        .user-msg { color: blue; text-align: right; }
        .ai-msg { color: green; text-align: left; }
    </style>
</head>
<body>

    <header>
        <h1>Willkommen im ITECH Ausleihsystem</h1>
        <button onclick="logout()">Abmelden</button>
    </header>

    <main>
        <div id="status-bereich">
            <h3>Deine aktuellen Ausleihen:</h3>
            <ul id="loan-list">Lade Daten...</ul>
        </div>

        <hr>

        <div id="ai-chat">
            <h3>Frag den ITECH-Assistenten</h3>
            <div id="chat-box"></div>
            <input type="text" id="user-input" placeholder="Frag etwas zur Schule...">
            <button onclick="sendMessage()">Senden</button>
        </div>
    </main>

    <script>
        // 1. SUPABASE INITIALISIERUNG (Ersetze mit deinen echten Daten!)
        const SUPABASE_URL = 'DEINE_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'DEINER_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. DER TÜRSTEHER (AUTH-GUARD) - MUSS GANZ OBEN SEIN
        async function checkAuth() {
            const { data: { user }, error } = await supabase.auth.getUser();

            if (error || !user) {
                console.log("Kein gültiger Login. Umleitung zum Login...");
                // Pfad zur Login-Seite (anpassen falls nötig)
                window.location.href = "/login/index.html";
            } else {
                console.log("Eingeloggt als:", user.email);
                loadLoans(user.id); // Lade Daten nur wenn eingeloggt
            }
        }

        // 3. LOGOUT FUNKTION
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "/login/index.html";
        }

        // 4. KI-CHAT FUNKTION (Verbindung zu deiner api/ai.js auf Vercel)
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value;

            if (!message) return;

            // Nachricht im UI anzeigen
            chatBox.innerHTML += `<p class="user-msg"><b>Du:</b> ${message}</p>`;
            inputField.value = '';

            try {
                // Fetch an deine Vercel Serverless Function
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                chatBox.innerHTML += `<p class="ai-msg"><b>KI:</b> ${data.reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<p style="color:red">Fehler: KI nicht erreichbar.</p>`;
            }
        }

        // 5. BEISPIEL: DATEN LADEN (Deine Ausleihen)
        async function loadLoans(userId) {
            const { data, error } = await supabase
                .from('loans')
                .select('*')
                .eq('user_id', userId);

            const list = document.getElementById('loan-list');
            if (error) {
                list.innerHTML = "Fehler beim Laden.";
            } else if (data.length === 0) {
                list.innerHTML = "Keine aktiven Ausleihen.";
            } else {
                list.innerHTML = data.map(l => `<li>${l.item_name} (Rückgabe: ${l.due_date})</li>`).join('');
            }
        }

        // TÜRSTEHER STARTEN
        checkAuth();
    </script>
</body>
</html>
