<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>itech-ausleihsystem</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #fff;
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .page {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        width: 100%;
        max-width: 440px;
        min-height: 100vh;
        padding: 1.5rem;
        box-sizing: border-box;
      }
      .login {
        width: 100%;
        text-align: center;
      }
      .login h1 {
        margin: 0 0 1rem;
        font-size: 1.5rem;
        letter-spacing: 0.03em;
      }
      .login form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
        width: 100%;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
      }
      .form-field label {
        width: 100%;
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.25rem;
        text-align: left;
      }
      .form-field input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 0.35rem;
      }
      .password-row {
        display: flex;
        width: 100%;
        gap: 0.5rem;
        align-items: center;
      }
      .password-row input {
        flex: 1;
      }
      .submit-btn {
        width: var(--submit-button-width);
        height: var(--submit-button-height);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 0.35rem;
        cursor: pointer;
        font-size: 1.2rem;
      }
      .submit-btn:hover {
        opacity: 0.9;
      }
      .logo-wrap {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
      }
      :root {
        --username-field-width: 230px; /* Breite vom Username-Field */
        --password-field-width: 260px; /* Breite vom Password-Field */
        --submit-button-width: 3rem; /* Breite vom Button */
        --submit-button-height: 3rem; /* Höhe vom Buttons */
      }
      .logo {
        width: 100vmin;
        max-width: 100%;
        height: auto;
        object-fit: contain;
        opacity: 0.3;
      }
      .username-field {
        max-width: var(--username-field-width);
      }
      .password-field {
        max-width: var(--password-field-width);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="login">
        <h1>Login</h1>
        <form id="login-form">
          <div class="form-field username-field">
            <label for="username">Benutzername</label>
            <input id="username" name="username" type="text" autocomplete="username" />
          </div>
          <div class="form-field password-field">
            <label for="password">Passwort</label>
            <div class="password-row">
              <input id="password" name="password" type="password" autocomplete="current-password" />
              <button type="submit" class="submit-btn" aria-label="Anmelden">→</button>
            </div>
          </div>
          <div id="message" aria-live="polite" style="margin-top:0.75rem; font-size:0.9rem; color:#444;"></div>
        </form>

        <div class="logo-wrap">
          <img src="https://moodle.itech-bs14.de/pluginfile.php/1/core_admin/logocompact/300x300/1768826611/logo_Signe.png" class="logo" alt="moodle@ITECH" />
        </div>
      </section>
    </main>

    <script type="module" src="supabase.js"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
